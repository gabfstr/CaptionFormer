_BASE_: "../_base.yaml"

DATALOADER:
  NUM_WORKERS: 64
DATASETS:
  TRAIN:
  - vln_dvoc_train
  TEST:
  - vln_dvoc_val_extended
MODEL:
  CAPTIONING_HEAD:
    AGGREGATION_METHOD: weighted mean
    AGGREGATION_NUM_T: 8
    FEATURE_MAPPING: vln_uvo_sparse
    MAX_TXT_LEN: 32
  MASK_FORMER:
    BOX_MODE_ON: false
    BOX_ONLY: false
    CAPTIONING_MAX_OUT_LEN: 30
    CLIP_CLASSIFIER: false
    CLIP_IMAGE_PATH: datasets/metadata/lvvis_val_clip_feature.pkl
    CLIP_TEXT_PATH: datasets/metadata/fg_bg_5_10_lvvis_ens.npy
    INFERENCE_CLIP_LEN: 1
    MULTI_FRAME_CAPTIONING: true
    TOPK_MATCHING: true
    TOPK_MATCHING_NUM_K: 5
    TOPK_MATCHING_NUM_T: 20
    USE_BOXES: false
    USE_MASKS: true
    HYSTERESIS_FILTER:
      ENABLED: true
      T_LOW: 0.3
      T_HIGH: 0.9
      MIN_DURATION: 5
  SEM_SEG_HEAD:
    IN_FEATURES:
    - res2
    - res3
    - res4
    - res5
    NUM_CLASSES: 1
  SWIN:
    OUT_FEATURES:
    - res2
    - res3
    - res4
    - res5
  WEIGHTS: ./models/ckpt_vln.pth
OUTPUT_DIR: ./outputs/eval/vln/
